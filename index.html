<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AR CARD 07</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial;
    }

    a-scene {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }

    /* ===== 识别框 ===== */
    .frame {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 240px;
      height: 160px;
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 12px;
      z-index: 10;
      pointer-events: none;
    }

    .frame::after {
      content: "Align card / 对准卡片";
      position: absolute;
      bottom: -28px;
      width: 100%;
      text-align: center;
      font-size: 12px;
      color: white;
      opacity: 0.8;
    }

    /* ===== loading ===== */
    #loading {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 20;
    }

    .title {
      font-size: 20px;
      letter-spacing: 2px;
    }

    .sub {
      font-size: 13px;
      opacity: 0.7;
      margin-top: 10px;
      text-align: center;
    }

    .loader {
      width: 24px;
      height: 24px;
      border: 2px solid white;
      border-top: 2px solid transparent;
      border-radius: 50%;
      margin-top: 15px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

  </style>
</head>

<body>

<!-- UI -->
<div class="frame"></div>

<!-- loading -->
<div id="loading">
  <div class="title">SHAPE UNDEFINED</div>
  <div class="sub">Camera starting / 摄像头启动中</div>
  <div class="loader"></div>
</div>

<!-- AR -->
<a-scene
  mindar-image="imageTargetSrc: targets.mind; autoStart: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
>

  <a-assets>
    <a-asset-item id="model" src="model.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- 🌟 AR目标 + 旋转效果 -->
  <a-entity mindar-image-target="targetIndex: 0">

    <a-gltf-model
      src="#model"
      scale="0.5 0.5 0.5"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear"
    ></a-gltf-model>

  </a-entity>

</a-scene>

<script>
  const loading = document.getElementById("loading");

  window.addEventListener("load", () => {
    setTimeout(() => {
      loading.style.opacity = 0;
      setTimeout(() => loading.style.display = "none", 500);
    }, 1200);
  });
</script>

</body>
</html>
